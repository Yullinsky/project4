{% extends "network/layout.html" %}

{% block body %}
<!--
Aqui van a ir los posts
-->
    <div class="container">
        <h2>ALL POSTS</h2>

        {% for post in posts %}
            <div class="card my-3 p-3 border">
                <h5 class="card-title"><strong>{{ post.user.username }}</strong></h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ post.date_time }}</h6>
                <p class="card-text">{{ post.body }}</p>
                <p class="text-primary">Likes: 0</p>
            </div>
        {% empty %}
            <p> No hay publicaciones todavía.</p>
        {% endfor %}
    </div>
{% endblock %}
